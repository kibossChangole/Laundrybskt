<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>laundrybskt</title>
  </head>
  <body style="margin: 0; position:relative;">
    <div id="app">
     <div id="card-label" style="
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 1.5rem;
      font-family: sans-serif;
      margin-top:50px;
      margin-bottom:auto;
      max-height: 400px;
      width: 90%;
      padding: 5px 10px;
      overflow-y: auto; /* Changed 'scroll' to 'auto' so scrollbars only appear when needed */
      opacity: 0;
      pointer-events: none; /* Keep this here initially so it doesn't block clicks while invisible */
      transition: opacity 0.4s ease;
    "></div>

<button id="back-button" style="
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  padding: 0.6rem 1.6rem;
  background: white;
  border: none;
  border-radius: 2rem;
  font-size: 1rem;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
">← Back</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
