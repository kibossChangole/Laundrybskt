<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>laundrybskt</title>
  </head>
  <body style="margin: 0; position:relative; overflow: hidden; background-color: #d97d55;">
    <div id="app">
      
      <div style="
        position: absolute;
        top: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        padding: 0.6rem 1.5rem;
        border-radius: 3rem;
        color: white;
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        letter-spacing: 0.05em;
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 1rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      ">
        <span style="
          font-weight: 700; 
          text-transform: uppercase; 
          padding-right: 0.5rem;
          white-space: nowrap;
          border-right: 1px solid rgba(255, 255, 255, 0.2);
        ">
          Kiboss Changole
        </span>

        <div class="nav-dropdown-menu" style="position: relative;">
          <button style="
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: background 0.2s ease;
          "
          onmouseover="this.style.background='rgba(255, 255, 255, 0.2)'"
          onmouseout="this.style.background='rgba(255, 255, 255, 0.1)'"
          >
            Links
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity: 0.7;">
              <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <nav class="dropdown-content" style="
            display: none;
            position: absolute;
            top: calc(100% + 0.5rem);
            right: 0;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 160px;
            box-shadow: 0px 12px 30px rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 0.5rem;
            z-index: 200;
            box-sizing: border-box;
          ">
            <a href="https://github.com/yourusername" target="_blank" rel="noopener noreferrer" class="dropdown-item">GitHub</a>
            <a href="https://linkedin.com/in/yourusername" target="_blank" rel="noopener noreferrer" class="dropdown-item">LinkedIn</a>
            <a href="/path-to-resume.pdf" target="_blank" class="dropdown-item">Resume</a>
            <div class="game-btn dropdown-item" style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="3" ry="3"></rect><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="11" x2="15.01" y2="11"></line><line x1="18" y1="13" x2="18.01" y2="13"></line></svg>
              <span>Play Ground</span>
            </div>
          </nav>
        </div>

        <nav class="nav-flat-menu" style="display: flex; align-items: center; gap: 1.2rem;">
          <a href="https://github.com/yourusername" target="_blank" rel="noopener noreferrer" class="flat-item">GitHub</a>
          <a href="https://linkedin.com/in/yourusername" target="_blank" rel="noopener noreferrer" class="flat-item">LinkedIn</a>
          <a href="/path-to-resume.pdf" target="_blank" class="flat-item">Resume</a>
          
          <div class="game-btn" style="
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease-in-out;
          "
          onmouseover="this.style.background='rgba(255, 255, 255, 0.25)'; this.style.transform='scale(1.05)';"
          onmouseout="this.style.background='rgba(255, 255, 255, 0.12)'; this.style.transform='scale(1)';"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: block; pointer-events: none;">
              <rect x="2" y="6" width="20" height="12" rx="3" ry="3"></rect>
              <line x1="6" y1="12" x2="10" y2="12"></line>
              <line x1="8" y1="10" x2="8" y2="14"></line>
              <line x1="15" y1="11" x2="15.01" y2="11"></line>
              <line x1="18" y1="13" x2="18.01" y2="13"></line>
            </svg>
          </div>
        </nav>

      </div>

      <div id="game-view" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 5;
        background: #141414;
        color: white;
        font-family: 'DM Sans', sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transform: translateY(100vh);
        transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.8s ease;
      ">
        <div style="text-align: center; max-width: 600px; padding: 2rem;">
          <h2 style="font-size: 3rem; margin-bottom: 1rem; font-weight: 700; letter-spacing: -0.03em;">Arcade </h2>
          <p style="color: #888; font-size: 1.1rem; line-height: 1.6; margin-bottom: 2rem;">
           Play Quick Flash Games
          </p>
          <script type="text/javascript">
            boatload_puzzles_format = 'Portrait';</script>
            <p>Loading <a href="https://www.boatloadpuzzles.com/playcrossword">
            crossword puzzle</a>. One moment please.</p>
            <script type="text/javascript"
            src="//www.boatloadpuzzles.com/Crossword.js"></script>
          <button id="close-game-btn" style="
            background: #ffffff;
            color: #141414;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,255,255,0.05);
            transition: transform 0.2s ease;
          "
          onmouseover="this.style.transform='scale(1.05)'"
          onmouseout="this.style.transform='scale(1)'"
          >Return to Gallery</button>
        </div>
      </div>

      <div id="card-label" style="
         position: absolute;
         top: 50%;
         left: 50%;
         transform: translate(-50%, -50%);
         color: white;
         font-family: sans-serif;
         width: 100%;
         height: 400px;
         overflow-y: auto;
         opacity: 0;
         pointer-events: none;
         transition: opacity 0.4s ease;
         box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      "></div>

      <button id="back-button" style="
        position: absolute;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 1.6rem;
        background: #d97d55;
        border: none;
        border-radius: 2rem;
        font-size: 1rem;
        cursor: pointer;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        z-index: 50;
      ">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display: block; pointer-events: none;">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span style="color:white; pointer-events: none;">Back</span>
      </button>

    </div>
    
    <script type="module" src="/src/main.ts"></script>

    <style>
      .nav-dropdown-menu { display: none !important; }
      .nav-flat-menu { display: flex !important; }
      .flat-item {
        color: rgba(255, 255, 255, 0.75);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s ease;
      }
      .flat-item:hover { color: #ffffff; }

      @media (max-width: 600px) {
        .nav-flat-menu { display: none !important; }
        .nav-dropdown-menu { display: block !important; }
        .nav-dropdown-menu:hover .dropdown-content {
          display: flex !important;
          flex-direction: column;
          gap: 0.25rem;
        }
      }

      .dropdown-item {
        color: rgba(255, 255, 255, 0.7) !important;
        text-decoration: none !important;
        padding: 0.6rem 1rem !important;
        font-family: 'DM Sans', sans-serif !important;
        font-size: 13px !important;
        border-radius: 8px !important;
        transition: background 0.2s ease, color 0.2s ease !important;
      }
      .dropdown-item:hover {
        background: rgba(255, 255, 255, 0.1) !important;
        color: #ffffff !important;
      }
    </style>
  </body>
</html>
