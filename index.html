<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>laundrybskt</title>
  </head>
  <body style="margin: 0; position:relative;">
    <div id="app">
      
      <div style="
        position: absolute;
        top: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        padding: 0.6rem 1.5rem;
        border-radius: 3rem;
        color: white;
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        letter-spacing: 0.05em;
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 1rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      ">
        <span style="
          font-weight: 700; 
          text-transform: uppercase; 
          padding-right: 0.5rem;
          white-space: nowrap;
          border-right: 1px solid rgba(255, 255, 255, 0.2);
        ">
          Kiboss Changole
        </span>

        <div class="nav-dropdown-menu" style="position: relative;">
          <button style="
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: background 0.2s ease;
          "
          onmouseover="this.style.background='rgba(255, 255, 255, 0.2)'"
          onmouseout="this.style.background='rgba(255, 255, 255, 0.1)'"
          >
            Links
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity: 0.7;">
              <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <nav class="dropdown-content" style="
            display: none;
            position: absolute;
            top: calc(100% + 0.5rem);
            right: 0;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 160px;
            box-shadow: 0px 12px 30px rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 0.5rem;
            z-index: 200;
            box-sizing: border-box;
          ">
            <a href="https://github.com/yourusername" target="_blank" rel="noopener noreferrer" class="dropdown-item">GitHub</a>
            <a href="https://linkedin.com/in/yourusername" target="_blank" rel="noopener noreferrer" class="dropdown-item">LinkedIn</a>
            <a href="/path-to-resume.pdf" target="_blank" class="dropdown-item">Resume</a>
          </nav>
        </div>

        <nav class="nav-flat-menu" style="display: flex; align-items: center; gap: 1.2rem;">
          <a href="https://github.com/yourusername" target="_blank" rel="noopener noreferrer" class="flat-item">GitHub</a>
          <a href="https://linkedin.com/in/yourusername" target="_blank" rel="noopener noreferrer" class="flat-item">LinkedIn</a>
          <a href="/path-to-resume.pdf" target="_blank" class="flat-item">Resume</a>
        </nav>

      </div>

      <div id="card-label" style="
         position: absolute;
         top: 50%;
         left: 50%;
         transform: translate(-50%, -50%);
         color: white;
         font-family: sans-serif;
         width: 100%;
         height: 400px;
         overflow-y: auto;
         opacity: 0;
         pointer-events: none;
         transition: opacity 0.4s ease;
         box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      "></div>

      <button id="back-button" style="
        position: absolute;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 1.6rem;
        background: #d97d55;
        border: none;
        border-radius: 2rem;
        font-size: 1rem;
        cursor: pointer;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      ">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display: block; pointer-events: none;">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span style="color:white; pointer-events: none;">Back</span>
      </button>

    </div>
    
    <script type="module" src="/src/main.ts"></script>

    <style>
      /* --- DESKTOP FIRST STYLING RULES (Screen width > 600px) --- */
      .nav-dropdown-menu {
        display: none !important; /* Hide the mobile dropdown trigger on desktop */
      }
      .nav-flat-menu {
        display: flex !important; /* Show flat links bar on desktop screens */
      }
      .flat-item {
        color: rgba(255, 255, 255, 0.75);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s ease;
      }
      .flat-item:hover {
        color: #ffffff;
      }

      /* --- MOBILE OVERRIDE CONSTRAINTS (Screen width <= 600px) --- */
      @media (max-width: 600px) {
        .nav-flat-menu {
          display: none !important; /* Hide the wide link row on compact displays */
        }
        .nav-dropdown-menu {
          display: block !important; /* Revive the compact button menu dropdown */
        }
        .nav-dropdown-menu:hover .dropdown-content {
          display: flex !important;
          flex-direction: column;
          gap: 0.25rem;
        }
      }

      /* Base utilities for the mobile dropdown element context */
      .dropdown-item {
        color: rgba(255, 255, 255, 0.7) !important;
        text-decoration: none !important;
        padding: 0.6rem 1rem !important;
        font-family: 'DM Sans', sans-serif !important;
        font-size: 13px !important;
        border-radius: 8px !important;
        transition: background 0.2s ease, color 0.2s ease !important;
      }
      .dropdown-item:hover {
        background: rgba(255, 255, 255, 0.1) !important;
        color: #ffffff !important;
      }
    </style>
  </body>
</html>
